spring.application.name=autotrack360

# Database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost/auto_track_360
spring.datasource.username=postgres
spring.datasource.password=Lapaix@123

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=autotrack360-super-secret-key-for-jwt-signing-must-be-long-enough
app.jwt.expiration=86400000

# File Upload
app.upload.dir=uploads
app.base-url=http://localhost:8080
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# SMS Settings
# Set app.sms.enabled=true and configure provider for production
app.sms.enabled=false
app.sms.provider=console
app.sms.api-key=
app.sms.sender-id=AutoTrack360

# Email Settings
# Set app.email.enabled=true and configure SMTP for production
app.email.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@autotrack360.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.hibernate=WARN
